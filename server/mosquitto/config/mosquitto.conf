# =============================================================================
#  Configuracion del broker Mosquitto
# =============================================================================

listener 1883
protocol mqtt

# Listener extra por websockets (opcional)
listener 9001
protocol websockets

# ---- Persistencia (guarda mensajes retenidos entre reinicios) --------------
persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# ---- Autenticacion ---------------------------------------------------------
# MODO DESARROLLO (rapido para probar): anonimo permitido.
allow_anonymous true

# MODO SEGURO (recomendado para la entrega): descomenta estas 2 lineas,
# pon allow_anonymous en false y crea el archivo de contraseñas con:
#
#   docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd iot
#   docker restart mosquitto
#
# Luego pon MQTT_USER="iot" y MQTT_PASS="..." en el secrets.h del ESP32.
#
# password_file /mosquitto/config/passwd
