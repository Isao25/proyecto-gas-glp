; =============================================================================
;  PlatformIO  -  Nodo detector de fuga de GLP  (ESP32-S3 DevKitC-1)
;  Abrir la carpeta 'firmware/' en VS Code con la extension PlatformIO.
;  Las librerias se instalan solas al compilar (Build).
; =============================================================================
[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; Necesario para que el Monitor Serie funcione por el USB-C nativo del S3.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

; No fijamos upload_port/monitor_port: PlatformIO autodetecta el puerto
; (/dev/cu.usbmodem* en Mac, COMx en Windows).

lib_deps =
    256dpi/MQTT@^2.5.2                    ; MQTT con QoS 0/1 + LWT
    bblanchon/ArduinoJson@^7.1.0          ; payloads JSON
    miguel5612/MQUnifiedsensor@^3.0.0     ; calibracion Rs/Ro del MQ-2
    adafruit/Adafruit SSD1306@^2.5.9      ; OLED monocromo
    adafruit/Adafruit GFX Library@^1.11.9
